# Screening criteria
criteria:
  # Fundamental filters
  - type: fundamental
    metric: market_cap
    operator: ">"
    value: 100_000_000_000  # $100B

  - type: fundamental
    metric: pe_ratio
    operator: "<"
    value: 50  # More flexible

  - type: fundamental
    metric: dividend_yield
    operator: ">"
    value: 0.005  # 0.5% (more flexible)

  - type: fundamental
    metric: revenue_growth
    operator: ">"
    value: 0.03  # 3% YoY (more flexible)

  # Technical filters (optional)
  - type: technical
    metric: rsi_14
    operator: "<"
    value: 75  # Not extremely overbought

  - type: technical
    metric: price_above_ma200
    operator: "=="
    value: true  # Uptrend filter

# Ranking (weights sum to 1.0)
ranking:
  value_score: 0.4      # P/E, P/B, EV/EBITDA
  quality_score: 0.3    # ROE, debt/equity, earnings consistency
  momentum_score: 0.3   # 3M return, volume trend

# News settings (optional)
news:
  enabled: true
  provider: finnhub
  days_back: 7
  max_headlines: 5
  require_api_key: true  # Set FINNHUB_API_KEY in .env

# Output settings
output:
  format: [markdown, csv, json]  # Output formats
  max_results: 50  # Max passing stocks to return
  save_dir: results
