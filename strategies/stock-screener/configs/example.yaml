    - INTC
    # Financials
    - JPM
    - BAC
    - WFC
    - GS
    - MS
    - BLK
    - SCHW
    - C
    # Payments
    - V
    - MA
    - AXP
    # Consumer Discretionary
    - HD
    - MCD
    - NKE
    - SBUX
    - LOW
    - TJX
    # Consumer Staples
    - WMT
