# Orderbook Strategy Configuration

# Data parameters
tick_size: 0.01
symbol: "BTC/USD"

# Range and depth
range_window_s: 60
depth_levels: 5

# Detection windows
sweep_window_s: 2
absorption_window_s: 3
delta_window_s: 1

# Thresholds
imb_threshold: 0.15
sweep_min_notional: 10000
depth_drop_pct: 0.3
delta_abs_min_notional: 8000  # Use notional for consistency with sweep (delta * price)

# Entry
retest_ticks: 2

# Exits
stop_ticks: 2
time_stop_s: 60
flip_confirm_s: 2

# Execution
fee_per_share_or_contract: 0.0
slippage_ticks: 1
latency_ms: 100

# Probability / Distribution
horizon_s: 10
dist_type: "normal"  # "normal" or "hist"
dist_lookback: 2000
hist_bins: 60
min_dist_samples: 20  # Lowered for testing (was 200)
sigma_floor: 1.0e-6
p_threshold: 0.52  # Lowered for testing (was 0.57)
use_state_conditioning: true

# Position sizing
base_qty: 1
use_prob_sizing: true
edge_ref: 0.10
max_mult: 3.0

# Liquidity wall detection (optional)
wall_mult: 3.0
wall_lookback_s: 5

# Logging
log_level: "INFO"
log_trades: true
log_signals: true
